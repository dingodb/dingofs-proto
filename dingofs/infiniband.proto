syntax = "proto3";

package dingofs.pb.infiniband;

option cc_generic_services = true;
option go_package = "dingofs/proto/infiniband";

enum ErrorCode {
    Ok = 0;
    Unknown = 1;
    InternalError = 2;
    QueuePairError = 3;
    ProtocolError = 4;
    NoMem = 5;
    Timeout = 6;
}

message RequestMeta {
    string service_name = 1;
    string method_name = 2;
    uint32 attachment_size = 3;
    uint64 addr = 4;
    uint32 length = 5;
    uint32 rkey = 6;
}

message ResponseMeta {
    int32 error_code = 1;
    string error_message = 2;
    uint32 attachment_size = 3;
}

message ConnManagementMeta {
    uint32 qpn = 1;
    uint32 lid = 2;
    bytes gid = 3;
    uint32 port_num = 4;
    uint32 link_type = 5;
    uint32 mtu = 6;
}

message SyncRequest {
    ConnManagementMeta cm_meta = 1;
}

message SyncResponse {
    ConnManagementMeta cm_meta = 1;
}

service InfinibandService {
    rpc Sync (SyncRequest) returns (SyncResponse);
}
